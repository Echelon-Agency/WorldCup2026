<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        // 1. FIX: Grab the hooks and icons from the global window objects
        const { useState, useEffect, useMemo } = React;
        const { 
            Trophy, Users, Ticket, Clock, Menu, X, Headphones, 
            TrendingUp, ShieldCheck, ChevronRight, Globe, MapPin, 
            Mail, Instagram, Twitter, Linkedin, Sparkles, 
            CheckCircle2, Calendar, Star, Plus, Minus, Bitcoin, ExternalLink 
        } = window.lucide;

        const Logo = ({ className = "w-10 h-10" }) => (
            <svg viewBox="0 0 100 100" className={className} fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 20L40 80L50 50L60 80L80 20" stroke="currentColor" strokeWidth="8" strokeLinecap="round" strokeLinejoin="round"/>
                <circle cx="50" cy="25" r="8" fill="currentColor" />
                <path d="M30 90H70" stroke="currentColor" strokeWidth="4" strokeLinecap="round"/>
            </svg>
        );

        const App = () => {
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);
            const TOTAL_TICKETS = 150000;
            const [ticketsSold, setTicketsSold] = useState(124842);
            const [ticketQty, setTicketQty] = useState(1);
            const [isBuying, setIsBuying] = useState(false);
            const [purchaseComplete, setPurchaseComplete] = useState(false);
            const [timeLeft, setTimeLeft] = useState({ days: 0, hours: 0, minutes: 0, seconds: 0 });

            useEffect(() => {
                const targetDate = new Date('June 11, 2026 00:00:00').getTime();
                const interval = setInterval(() => {
                    const now = new Date().getTime();
                    const distance = targetDate - now;
                    if (distance > 0) {
                        setTimeLeft({
                            days: Math.floor(distance / (1000 * 60 * 60 * 24)),
                            hours: Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)),
                            minutes: Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)),
                            seconds: Math.floor((distance % (1000 * 60)) / 1000),
                        });
                    }
                    if (Math.random() > 0.7) {
                        setTicketsSold(prev => Math.min(prev + Math.floor(Math.random() * 3), TOTAL_TICKETS));
                    }
                }, 1000);
                return () => clearInterval(interval);
            }, []);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const availableTickets = useMemo(() => TOTAL_TICKETS - ticketsSold, [ticketsSold]);

            const adjustQty = (val) => {
                setTicketQty(prev => Math.max(1, Math.min(10, prev + val)));
            };

            const handlePurchase = (e) => {
                e.preventDefault();
                setIsBuying(true);
                setTimeout(() => {
                    setIsBuying(false);
                    setPurchaseComplete(true);
                    setTicketsSold(prev => prev + ticketQty);
                }, 2000);
            };

            const partners = {
                top: ["Adidas", "Coca-Cola", "Visa", "Qatar Airways", "Lenovo", "Hyundai-Kia", "Aramco"],
                tier2: ["Bank of America", "Lay's", "McDonald's", "Hisense", "AB InBev (Budweiser)"],
                supporters: ["DoorDash", "Verizon", "Airbnb", "The Home Depot"]
            };

            return (
                <div className="min-h-screen bg-black text-white font-sans selection:bg-yellow-500 selection:text-black scroll-smooth">
                    <nav className={`fixed w-full z-50 transition-all duration-500 ${scrolled ? 'bg-black/90 backdrop-blur-xl py-3 border-b border-white/10' : 'bg-transparent py-6'}`}>
                        <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                            <div className="flex items-center space-x-3 group cursor-pointer">
                                <Logo className="w-8 h-8 text-yellow-500 group-hover:rotate-12 transition-transform duration-300" />
                                <span className="text-xl font-black tracking-tighter uppercase italic">WorldCup<span className="text-yellow-500">2026</span></span>
                            </div>
                            <div className="hidden md:flex space-x-10 text-[10px] font-bold uppercase tracking-[0.2em]">
                                <a href="#tickets" className="text-yellow-500 hover:text-white transition-colors">Tickets</a>
                                <a href="#qualifiers" className="hover:text-yellow-500 transition-colors">Qualifiers</a>
                                <a href="#sponsors" className="hover:text-yellow-500 transition-colors">Partners</a>
                                <a href="#support" className="hover:text-yellow-500 transition-colors">Support</a>
                            </div>
                            <a href="#tickets" className="hidden md:block bg-yellow-500 text-black px-6 py-2 text-[10px] font-black uppercase tracking-widest hover:bg-white transition-all transform hover:-translate-y-1">
                                Buy Tickets
                            </a>
                            <button className="md:hidden" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                                {isMenuOpen ? <X /> : <Menu className="text-yellow-500" />}
                            </button>
                        </div>
                    </nav>

                    <section className="relative h-[90vh] flex items-center justify-center overflow-hidden">
                        <div className="absolute inset-0 z-0">
                            <video autoPlay loop muted playsInline className="w-full h-full object-cover opacity-60">
                                <source src="ad2.mp4" type="video/mp4" />
                            </video>
                            <div className="absolute inset-0 bg-gradient-to-b from-black via-black/20 to-black"></div>
                        </div>
                        <div className="relative z-10 text-center px-6 max-w-5xl">
                            <div className="inline-flex items-center space-x-2 bg-yellow-500/10 backdrop-blur-md border border-yellow-500/30 px-5 py-2 rounded-full mb-10">
                                <Trophy className="w-3 h-3 text-yellow-500" />
                                <span className="text-[9px] uppercase tracking-[0.4em] font-black text-yellow-500">The Road To North America</span>
                            </div>
                            <h1 className="text-5xl md:text-9xl font-black uppercase italic tracking-tighter leading-[0.85] mb-8">
                                Live The <br /> <span className="text-transparent bg-clip-text bg-gradient-to-r from-yellow-500 via-white to-yellow-600">Dream</span>
                            </h1>
                            <p className="text-neutral-400 text-lg md:text-xl max-w-2xl mx-auto mb-12 font-light tracking-wide uppercase italic">
                                Witness the global icons in their prime. 48 Teams. 3 Nations. 1 Champion.
                            </p>
                            <div className="flex flex-col sm:flex-row items-center justify-center space-y-5 sm:space-y-0 sm:space-x-8">
                                <a href="#tickets" className="w-full sm:w-auto bg-white text-black px-12 py-5 font-black uppercase tracking-widest hover:bg-yellow-500 transition-all flex items-center justify-center group text-sm shadow-[0_0_30px_rgba(255,255,255,0.1)]">
                                    Secure Seats <Ticket className="ml-3 w-5 h-5" />
                                </a>
                                <a href="#qualifiers" className="w-full sm:w-auto border-b-2 border-white/20 px-4 py-5 font-black uppercase tracking-[0.2em] text-xs hover:border-yellow-500 transition-all">
                                    Watch Highlights
                                </a>
                            </div>
                        </div>
                    </section>

                    <section className="bg-yellow-500 text-black py-6">
                        <div className="max-w-7xl mx-auto px-6 flex flex-col md:flex-row items-center justify-between">
                            <div className="flex items-center mb-4 md:mb-0">
                                <Calendar className="w-5 h-5 mr-3" />
                                <span className="text-[10px] font-black uppercase tracking-widest">Global Kickoff Countdown</span>
                            </div>
                            <div className="flex space-x-10 md:space-x-16">
                                {[
                                    { label: 'Days', value: timeLeft.days },
                                    { label: 'Hrs', value: timeLeft.hours },
                                    { label: 'Mins', value: timeLeft.minutes },
                                    { label: 'Secs', value: timeLeft.seconds },
                                ].map((unit, i) => (
                                    <div key={i} className="text-center">
                                        <div className="text-2xl md:text-4xl font-black italic leading-none">{String(unit.value).padStart(2, '0')}</div>
                                        <div className="text-[8px] uppercase font-bold tracking-tighter opacity-70">{unit.label}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    <section id="tickets" className="py-32 px-6 bg-neutral-950 border-y border-white/5">
                        <div className="max-w-6xl mx-auto">
                            <div className="grid lg:grid-cols-2 gap-20 items-start">
                                <div>
                                    <h2 className="text-5xl md:text-7xl font-black uppercase italic tracking-tighter leading-none mb-8">
                                        Official <br /> <span className="text-yellow-500">Ticketing</span>
                                    </h2>
                                    <div className="space-y-12">
                                        <div className="p-8 bg-black border border-white/10 rounded-sm">
                                            <div className="flex justify-between items-end mb-4">
                                                <div className="text-[10px] uppercase font-black tracking-widest text-neutral-500">Global Availability Engine</div>
                                                <div className="text-xl font-mono font-black text-yellow-500 animate-pulse">LIVE</div>
                                            </div>
                                            <div className="w-full bg-neutral-900 h-2 rounded-full overflow-hidden mb-6">
                                                <div 
                                                    className="bg-yellow-500 h-full transition-all duration-1000 ease-out"
                                                    style={{ width: `${(ticketsSold / TOTAL_TICKETS) * 100}%` }}
                                                ></div>
                                            </div>
                                            <div className="grid grid-cols-2 gap-8">
                                                <div>
                                                    <div className="text-3xl font-black italic">{availableTickets.toLocaleString()}</div>
                                                    <div className="text-[9px] uppercase font-bold tracking-widest text-neutral-600">Tickets Available</div>
                                                </div>
                                                <div>
                                                    <div className="text-3xl font-black italic">{ticketsSold.toLocaleString()}</div>
                                                    <div className="text-[9px] uppercase font-bold tracking-widest text-neutral-600">Reserved Globally</div>
                                                </div>
                                            </div>
                                        </div>
                                        
                                        <div className="flex items-start space-x-6">
                                            <div className="bg-yellow-500/10 p-4 rounded-full border border-yellow-500/20">
                                                <Bitcoin className="w-8 h-8 text-yellow-500" />
                                            </div>
                                            <div>
                                                <h3 className="text-xl font-bold uppercase italic mb-2">Bitcoin Only Policy</h3>
                                                <p className="text-neutral-500 text-sm leading-relaxed">
                                                    To ensure elite security and decentralized processing, all official WorldCup2026 transactions are processed exclusively via Bitcoin (BTC). 
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-neutral-900/50 p-10 border border-white/5 shadow-2xl relative">
                                    {!purchaseComplete ? (
                                        <form onSubmit={handlePurchase} className="space-y-8">
                                            <div className="flex items-center justify-between p-6 bg-black border border-white/10">
                                                <div>
                                                    <div className="text-[10px] uppercase font-black tracking-widest text-neutral-500 mb-1">Ticket Quantity</div>
                                                    <div className="text-2xl font-black italic">{ticketQty} PASSES</div>
                                                </div>
                                                <div className="flex items-center space-x-4">
                                                    <button type="button" onClick={() => adjustQty(-1)} className="w-10 h-10 border border-white/10 flex items-center justify-center hover:bg-white hover:text-black transition-all"><Minus size={16}/></button>
                                                    <button type="button" onClick={() => adjustQty(1)} className="w-10 h-10 border border-white/10 flex items-center justify-center hover:bg-white hover:text-black transition-all"><Plus size={16}/></button>
                                                </div>
                                            </div>

                                            <div className="space-y-4">
                                                <div className="flex justify-between text-[10px] uppercase font-black tracking-[0.2em] text-neutral-500">
                                                    <span>Tournament Category</span>
                                                    <span>Category 1 (Finals)</span>
                                                </div>
                                                <div className="flex justify-between items-end border-b border-white/10 pb-4">
                                                    <span className="text-3xl font-black italic">{(0.015 * ticketQty).toFixed(4)} BTC</span>
                                                    <span className="text-neutral-600 text-xs font-mono uppercase tracking-tighter">Est. Value</span>
                                                </div>
                                            </div>

                                            <button 
                                                disabled={isBuying}
                                                className="w-full bg-yellow-500 text-black py-6 font-black uppercase tracking-[0.3em] hover:bg-white transition-all flex items-center justify-center group"
                                            >
                                                {isBuying ? "Generating Address..." : "Proceed to Payment"}
                                            </button>
                                            
                                            <div className="flex items-center justify-center space-x-2 text-neutral-600">
                                                <ShieldCheck size={14} />
                                                <span className="text-[8px] uppercase font-bold tracking-widest">Secured by Blockchain Encryption</span>
                                            </div>
                                        </form>
                                    ) : (
                                        <div className="text-center py-12">
                                            <CheckCircle2 className="w-20 h-20 text-yellow-500 mx-auto mb-6" />
                                            <h3 className="text-3xl font-black uppercase italic mb-4">Invoice Generated</h3>
                                            <div className="bg-black p-4 mb-6 border border-yellow-500/30">
                                                <div className="text-[8px] uppercase font-bold text-neutral-500 mb-2">BTC Deposit Address</div>
                                                <code className="text-xs break-all text-yellow-500">bc1qxy2kgdygjrsqtzq2n0yrf2493p83kkfjhx0wlh</code>
                                            </div>
                                            <p className="text-xs text-neutral-400 mb-8 leading-relaxed">
                                                Please transfer exactly <b>{(0.015 * ticketQty).toFixed(4)} BTC</b> to the address above. Tickets will be released after 2 network confirmations.
                                            </p>
                                            <button onClick={() => setPurchaseComplete(false)} className="text-[9px] uppercase font-black tracking-widest text-yellow-500 underline">Generate New Invoice</button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </section>

                    <section id="qualifiers" className="py-32 px-6">
                        <div className="max-w-7xl mx-auto">
                            <div className="flex flex-col md:flex-row justify-between items-end mb-16">
                                <div>
                                    <h2 className="text-4xl md:text-6xl font-black uppercase italic tracking-tighter leading-none mb-4">The World <br /> <span className="text-yellow-500">Icons</span></h2>
                                    <p className="text-neutral-500 text-xs font-black uppercase tracking-[0.4em]">Current Tournament Status</p>
                                </div>
                                <div className="text-yellow-500 font-black italic text-xl opacity-40">2026 EDITION</div>
                            </div>

                            <div className="grid md:grid-cols-2 gap-10">
                                <div className="relative group overflow-hidden bg-neutral-900 aspect-video flex items-center justify-center">
                                    <video autoPlay loop muted playsInline className="absolute inset-0 w-full h-full object-cover opacity-50 transition-transform duration-1000 group-hover:scale-105">
                                        <source src="ad3.mp4" type="video/mp4" />
                                    </video>
                                    <div className="absolute inset-0 bg-gradient-to-t from-black to-transparent"></div>
                                    <div className="relative z-10 text-center p-8">
                                            <h4 className="text-2xl font-black uppercase italic mb-2 tracking-tighter">Qualifier Best Goals</h4>
                                            <p className="text-[10px] text-neutral-400 uppercase tracking-widest">Streaming Worldcup2026 Exclusives</p>
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-6">
                                    <div className="relative aspect-[3/4] overflow-hidden grayscale hover:grayscale-0 transition-all duration-700 group">
                                            <img src="cr7.jpg" alt="Icon 1" className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-1000" />
                                            <div className="absolute bottom-0 left-0 p-4 w-full bg-gradient-to-t from-black to-transparent">
                                                <div className="text-sm font-black italic uppercase">Legend Ready</div>
                                                <div className="text-[8px] uppercase tracking-widest text-neutral-400">Current Kit Edition</div>
                                            </div>
                                    </div>
                                    <div className="relative aspect-[3/4] overflow-hidden grayscale hover:grayscale-0 transition-all duration-700 group">
                                            <img src="haaland.jpg" alt="Icon 2" className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-1000" />
                                            <div className="absolute bottom-0 left-0 p-4 w-full bg-gradient-to-t from-black to-transparent">
                                                <div className="text-sm font-black italic uppercase">New Power</div>
                                                <div className="text-[8px] uppercase tracking-widest text-neutral-400">2026 Edition</div>
                                            </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <footer className="border-t border-white/5 pt-32 pb-12 px-6 bg-black">
                        <div className="max-w-7xl mx-auto">
                            <div className="grid grid-cols-1 md:grid-cols-4 gap-20 mb-32">
                                <div className="col-span-1 md:col-span-2">
                                    <div className="flex items-center space-x-3 mb-10">
                                        <Logo className="w-8 h-8 text-yellow-500" />
                                        <span className="text-2xl font-black uppercase italic tracking-tighter">WorldCup<span className="text-yellow-500">2026</span></span>
                                    </div>
                                    <h4 className="text-4xl font-black italic max-w-md mb-12 leading-tight uppercase">Architecting the greatest sporting legacy.</h4>
                                    <div className="flex space-x-6">
                                        {[Instagram, Twitter, Linkedin].map((Icon, i) => (
                                            <div key={i} className="w-12 h-12 border border-white/10 rounded-full flex items-center justify-center hover:bg-yellow-500 hover:text-black transition-all cursor-pointer">
                                                <Icon size={20} />
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
