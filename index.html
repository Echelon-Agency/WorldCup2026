<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldCup 2026 | Official Platform</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background-color 0.6s ease; background-color: #F4F4F4; }
        .gold-clip { background: linear-gradient(to right, #ca8a04, #000, #ca8a04); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .dark-mode .gold-clip { background: linear-gradient(to right, #eab308, #fff, #ca8a04); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        body.dark-mode { background-color: #000; color: #fff; }
    </style>
</head>
<body class="overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { Sun, Moon, Trophy, Headphones, Minus, Plus, CheckCircle2 } = window.lucide;

        const App = () => {
            const [darkMode, setDarkMode] = useState(false);
            const [ticketsSold, setTicketsSold] = useState(124842);
            const [ticketQty, setTicketQty] = useState(1);
            const [isBuying, setIsBuying] = useState(false);
            const [purchaseComplete, setPurchaseComplete] = useState(false);

            useEffect(() => {
                if (darkMode) document.body.classList.add('dark-mode');
                else document.body.classList.remove('dark-mode');
            }, [darkMode]);

            useEffect(() => {
                const interval = setInterval(() => {
                    setTicketsSold(prev => Math.min(prev + (Math.random() > 0.85 ? 1 : 0), 150000));
                }, 3000);
                return () => clearInterval(interval);
            }, []);

            const players = [
                { name: "Messi", file: "messi.jpg", team: "Argentina" },
                { name: "Ronaldo", file: "ronaldo.jpg", team: "Portugal" },
                { name: "Haaland", file: "haaland.jpg", team: "Norway" },
                { name: "Mbappé", file: "mbappe.jpg", team: "France" },
                { name: "Kvaratskhelia", file: "kvara.jpg", team: "Georgia" }
            ];

            const partners = {
                top: ["adidas.png", "coke.png", "visa.png", "qatar.png", "lenovo.png", "hyundai.png", "aramco.png"],
                tier2: ["boa.png", "lays.png", "mcdonalds.png", "hisense.png", "abinbev.png"],
                supporters: ["doordash.png", "verizon.png", "airbnb.png", "homedepot.png"]
            };

            return (
                <div className="min-h-screen">
                    {/* Toggle */}
                    <button onClick={() => setDarkMode(!darkMode)} className={`fixed bottom-8 right-8 z-[100] p-4 rounded-full shadow-xl border transition-all ${darkMode ? 'bg-white text-black border-white' : 'bg-black text-white border-black'}`}>
                        {darkMode ? <Sun size={20}/> : <Moon size={20}/>}
                    </button>

                    {/* Nav */}
                    <nav className={`fixed w-full z-50 py-4 px-6 flex justify-between items-center transition-all border-b ${darkMode ? 'bg-black/80 border-white/10' : 'bg-white/80 border-black/5'} backdrop-blur-md`}>
                        <div className="flex items-center space-x-2"><Trophy className="text-yellow-600" size={20} /><span className="font-black uppercase italic tracking-tighter text-lg">WorldCup<span className="text-yellow-600">2026</span></span></div>
                        <a href="#tickets" className={`px-6 py-2 text-[10px] font-black uppercase tracking-widest ${darkMode ? 'bg-yellow-500 text-black' : 'bg-black text-white'}`}>Buy Tickets</a>
                    </nav>

                    {/* Hero Section */}
                    <header className="relative h-screen flex items-center justify-center overflow-hidden bg-neutral-900">
                        <video autoPlay loop muted playsInline className={`absolute inset-0 w-full h-full object-cover transition-opacity duration-1000 ${darkMode ? 'opacity-30' : 'opacity-10 grayscale'}`}>
                            <source src="ad2.mp4" type="video/mp4" />
                        </video>
                        <div className="relative z-10 text-center px-6">
                            <h1 className="text-6xl md:text-[10rem] font-black italic gold-clip uppercase tracking-tighter leading-none">Live The <br/> Dream</h1>
                        </div>
                    </header>

                    {/* Player Grid */}
                    <section className="py-32 px-6 max-w-7xl mx-auto">
                        <h2 className="text-4xl font-black uppercase italic tracking-tighter mb-16">The World <span className="text-yellow-600">Icons</span></h2>
                        <div className="grid grid-cols-2 md:grid-cols-5 gap-8">
                            {players.map(p => (
                                <div key={p.name} className={`group relative overflow-hidden aspect-[3/4] border transition-all ${darkMode ? 'bg-neutral-900 border-white/5' : 'bg-white border-black/5 shadow-sm'}`}>
                                    <img src={p.file} alt={p.name} className="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-700" onError={(e) => e.target.src='https://via.placeholder.com/300x400?text=Icon'} />
                                    <div className={`absolute bottom-0 p-6 w-full bg-gradient-to-t ${darkMode ? 'from-black' : 'from-white'} to-transparent`}>
                                        <div className="text-sm font-black uppercase italic">{p.name}</div>
                                        <div className="text-[8px] uppercase tracking-widest text-yellow-600 font-bold">{p.team}</div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* Small Window Video Section */}
<section className={`py-20 border-t transition-colors duration-500 ${darkMode ? 'bg-black border-white/10' : 'bg-white border-black/5'}`}>
    <div className="max-w-4xl mx-auto px-6">
        <div className="flex flex-col md:flex-row items-center gap-12">
            
            {/* The Video Window */}
            <div className="w-full md:w-1/2 aspect-video bg-neutral-900 shadow-2xl relative group overflow-hidden border border-white/10">
                <video 
                    autoPlay 
                    loop 
                    muted 
                    playsInline 
                    className="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity"
                >
                    <source src="ad3.mp4" type="video/mp4" />
                </video>
                {/* Decorative Accent */}
                <div className="absolute top-4 left-4 bg-yellow-500 text-black text-[8px] font-black px-2 py-1 uppercase tracking-widest">
                    Live Preview
                </div>
            </div>

            {/* Accompanying Text */}
            <div className="w-full md:w-1/2 text-center md:text-left">
                <h3 className="text-2xl font-black uppercase italic tracking-tighter mb-4">
                    Tournament <span className="text-yellow-600">Broadcast</span>
                </h3>
                <p className={`text-xs uppercase tracking-widest leading-relaxed opacity-60 font-bold`}>
                    Experience every moment in high-definition. Our global broadcast network ensures the Upper Tier experience reaches every corner of the globe.
                </p>
            </div>

        </div>
    </div>
</section>
                    
                    {/* Tickets */}
                    <section id="tickets" className={`py-32 border-y px-6 ${darkMode ? 'bg-neutral-950 border-white/5' : 'bg-neutral-100 border-black/5'}`}>
                        <div className="max-w-6xl mx-auto grid md:grid-cols-2 gap-20">
                            <div>
                                <h2 className="text-5xl font-black uppercase italic mb-8">Official <span className="text-yellow-600">Ticketing</span></h2>
                                <div className={`p-8 border ${darkMode ? 'bg-black border-white/10' : 'bg-white border-black/5 shadow-xl'}`}>
                                    <div className="text-6xl font-black italic tracking-tighter mb-2">{(150000 - ticketsSold).toLocaleString()}</div>
                                    <div className="text-[10px] uppercase font-black text-yellow-600 tracking-widest">Available Passes</div>
                                </div>
                            </div>
                            <div className={`p-8 border ${darkMode ? 'bg-neutral-900 border-white/10' : 'bg-white border-black/5 shadow-2xl'}`}>
                                {!purchaseComplete ? (
                                    <div className="space-y-6">
                                        <div className="flex justify-between items-center bg-neutral-500/10 p-4">
                                            <span className="text-xs font-black uppercase">Qty: {ticketQty}</span>
                                            <div className="flex gap-2">
                                                <button onClick={() => setTicketQty(Math.max(1, ticketQty-1))} className="p-2 border border-black/10"><Minus size={14}/></button>
                                                <button onClick={() => setTicketQty(ticketQty+1)} className="p-2 border border-black/10"><Plus size={14}/></button>
                                            </div>
                                        </div>
                                        <div className="text-3xl font-black italic text-yellow-600">{(0.015 * ticketQty).toFixed(3)} BTC</div>
                                        <button onClick={() => {setIsBuying(true); setTimeout(() => {setIsBuying(false); setPurchaseComplete(true)}, 1500)}} className="w-full bg-yellow-500 text-black py-4 font-black uppercase tracking-widest">{isBuying ? "Processing..." : "Generate Invoice"}</button>
                                    </div>
                                ) : (
                                    <div className="text-center py-6">
                                        <CheckCircle2 className="mx-auto text-yellow-600 mb-4" size={48} />
                                        <div className="text-[10px] opacity-50 mb-2 uppercase">BTC Address</div>
                                        <div className="bg-black p-3 text-[9px] text-yellow-500 break-all mb-4">bc1qxy2kgdygjrsqtzq2n0yrf2493p83kkfjhx0wlh</div>
                                        <button onClick={() => setPurchaseComplete(false)} className="text-[10px] underline uppercase font-black">Reset</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </section>

                    {/* Sponsors */}
                    <section className="py-32 text-center px-6">
                        <div className="max-w-7xl mx-auto">
                            <div className="flex flex-wrap justify-center items-center gap-12 mb-16">
                                {partners.top.map(img => <img key={img} src={img} className={`h-12 grayscale hover:grayscale-0 transition-all ${darkMode ? 'invert opacity-70' : 'opacity-80'}`} onError={(e) => e.target.style.display='none'} />)}
                            </div>
                            <div className="flex flex-wrap justify-center items-center gap-10 mb-12">
                                {partners.tier2.map(img => <img key={img} src={img} className={`h-8 grayscale hover:grayscale-0 transition-all ${darkMode ? 'invert opacity-40' : 'opacity-50'}`} onError={(e) => e.target.style.display='none'} />)}
                            </div>
                            <div className="flex flex-wrap justify-center items-center gap-8">
                                {partners.supporters.map(img => <img key={img} src={img} className={`h-6 grayscale hover:grayscale-0 transition-all ${darkMode ? 'invert opacity-20' : 'opacity-30'}`} onError={(e) => e.target.style.display='none'} />)}
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="py-24 text-center px-6">
                        <div className={`inline-flex p-6 rounded-full mb-10 ${darkMode ? 'bg-yellow-500 text-black' : 'bg-black text-white'}`}><Headphones size={32} /></div>
                        <div className="flex flex-col md:flex-row justify-center gap-12 text-[10px] font-black tracking-widest uppercase mb-12 opacity-60">
                            <a href="mailto:worldcupsponsorship2026@gmail.com">General</a>
                            <a href="mailto:fifaworldcupsponsorship@gmail.com">Logistics</a>
                        </div>
                        <div className="text-[8px] font-bold opacity-20 tracking-[0.8em] uppercase">© 2026 WORLDCUP2026. OFFICIAL PLATFORM.</div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
